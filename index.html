<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>팬나눔 🎁</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:#f8fafc; color:#2d2d2d; min-height:100vh; }
    header { background:linear-gradient(135deg,#c084fc,#f472b6); color:white; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(192,132,252,.3); }
    header h1 { font-size:1.3rem; font-weight:700; cursor:pointer; }
    .header-btns { display:flex; gap:8px; align-items:center; }
    .btn { padding:8px 16px; border:none; border-radius:20px; font-size:.85rem; font-weight:600; cursor:pointer; transition:all .2s; }
    .btn:hover { transform:translateY(-1px); }
    .btn-white { background:white; color:#c084fc; }
    .btn-outline { background:transparent; color:white; border:2px solid white; }
    .btn-primary { background:linear-gradient(135deg,#c084fc,#f472b6); color:white; box-shadow:0 4px 12px rgba(192,132,252,.4); }
    .btn-danger { background:#fecdd3; color:#e11d48; }
    .btn-gray { background:#e5e7eb; color:#6b7280; }
    .btn-sm { padding:5px 12px; font-size:.78rem; }
    .nav-tabs { display:flex; background:white; border-bottom:2px solid #f3e8ff; position:sticky; top:57px; z-index:99; }
    .nav-tab { flex:1; padding:12px; text-align:center; font-size:.88rem; font-weight:600; color:#9ca3af; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .2s; }
    .nav-tab.active { color:#7c3aed; border-bottom-color:#7c3aed; }
    .page { display:none; padding:24px 16px; max-width:640px; margin:0 auto; }
    .page.active { display:block; }

    /* 카드 글래스모피즘 */
    .card {
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(31,38,135,0.05);
      padding:20px; margin-bottom:14px; transition:transform .15s;
    }
    .card:hover { transform:translateY(-2px); }
    .card.closed { opacity:.55; }
    .card.closed:hover { transform:none; }

    .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:.75rem; font-weight:700; margin-bottom:8px; margin-right:4px; }
    .badge-open { background:#f3e8ff; color:#9333ea; }
    .badge-closed { background:#fecdd3; color:#e11d48; }
    .badge-type { background:#fef3c7; color:#d97706; }
    .badge-artist { background:#e0f2fe; color:#0369a1; }
    .card h3 { font-size:1rem; font-weight:700; margin-bottom:6px; cursor:pointer; }
    .card h3:hover { color:#7c3aed; }
    .card .meta { font-size:.82rem; color:#6b7280; display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
    .card-actions { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
    .card-img { width:100%; border-radius:12px; margin-bottom:10px; max-height:200px; object-fit:cover; }

    /* 그라데이션 텍스트 */
    .main-gradient-text {
      background: linear-gradient(135deg, #94a3b8, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .form-group { margin-bottom:18px; }
    label { display:block; font-size:.88rem; font-weight:600; margin-bottom:6px; color:#4b5563; }
    input,select,textarea { width:100%; padding:12px 14px; border:1.5px solid #e5e7eb; border-radius:10px; font-size:.9rem; font-family:inherit; transition:border-color .2s; background:rgba(255,255,255,0.7); }
    input:focus,select:focus,textarea:focus { outline:none; border-color:#c084fc; background:white; }
    textarea { resize:vertical; min-height:80px; }
    .form-title { font-size:1.2rem; font-weight:700; margin-bottom:20px; color:#7c3aed; }
    #map { width:100%; height:240px; border-radius:12px; margin-top:8px; border:1.5px solid #e5e7eb; }
    .location-hint { font-size:.8rem; color:#9ca3af; margin-top:4px; }
    #selected-location { font-size:.85rem; color:#7c3aed; font-weight:600; margin-top:6px; min-height:20px; }

    .auth-box {
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(31,38,135,0.05);
      padding:32px 24px; max-width:400px; margin:40px auto;
    }
    .auth-box h2 { font-size:1.3rem; font-weight:700; margin-bottom:6px; color:#7c3aed; }
    .auth-box p { font-size:.85rem; color:#6b7280; margin-bottom:24px; }
    .auth-tab { display:flex; margin-bottom:24px; border-radius:10px; overflow:hidden; border:1.5px solid #e5e7eb; }
    .auth-tab button { flex:1; padding:10px; border:none; background:white; font-size:.9rem; font-weight:600; cursor:pointer; color:#9ca3af; transition:all .2s; }
    .auth-tab button.active { background:#7c3aed; color:white; }

    .empty { text-align:center; padding:60px 20px; color:#9ca3af; }
    .empty .emoji { font-size:3rem; margin-bottom:12px; }
    .empty p { font-size:.9rem; }
    #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#1f2937; color:white; padding:12px 24px; border-radius:24px; font-size:.88rem; font-weight:600; opacity:0; transition:opacity .3s; pointer-events:none; z-index:999; white-space:nowrap; }
    #toast.show { opacity:1; }
    .loading { text-align:center; padding:40px; color:#c084fc; font-size:.9rem; }
    .write-fab { position:fixed; bottom:28px; right:20px; background:linear-gradient(135deg,#c084fc,#f472b6); color:white; border:none; border-radius:50px; padding:14px 22px; font-size:.95rem; font-weight:700; cursor:pointer; box-shadow:0 4px 20px rgba(192,132,252,.45); transition:all .2s; display:none; }
    .write-fab:hover { transform:translateY(-2px) scale(1.03); }
    .search-box { display:flex; gap:8px; margin-bottom:8px; }
    .search-box input { flex:1; }
    .img-preview { width:100%; border-radius:10px; margin-top:8px; display:none; max-height:200px; object-fit:cover; }
    .artist-input-wrap { position:relative; }
    .artist-dropdown { position:absolute; top:100%; left:0; right:0; background:white; border:1.5px solid #c084fc; border-radius:10px; z-index:50; max-height:180px; overflow-y:auto; display:none; box-shadow:0 4px 12px rgba(0,0,0,.1); }
    .artist-dropdown div { padding:10px 14px; cursor:pointer; font-size:.9rem; }
    .artist-dropdown div:hover { background:#f3e8ff; }
    .filter-bar { display:flex; gap:8px; margin-bottom:16px; }
    .filter-bar input { flex:1; }
    .detail-img { width:100%; border-radius:12px; margin-bottom:16px; max-height:300px; object-fit:cover; }
    .back-btn { display:flex; align-items:center; gap:6px; color:#7c3aed; font-weight:600; font-size:.9rem; cursor:pointer; margin-bottom:16px; background:none; border:none; padding:0; }
    .comment-box { background:rgba(249,245,255,0.7); backdrop-filter:blur(6px); border-radius:12px; padding:14px; margin-bottom:10px; border:1px solid rgba(255,255,255,0.7); }
    .comment-nick { font-size:.82rem; font-weight:700; color:#7c3aed; margin-bottom:4px; }
    .comment-content { font-size:.88rem; color:#374151; line-height:1.5; }
    .comment-meta { font-size:.75rem; color:#9ca3af; margin-top:4px; display:flex; justify-content:space-between; align-items:center; }
    .comment-actions { display:flex; gap:6px; }
    .comment-input-box { display:flex; gap:8px; margin-top:12px; }
    .comment-input-box input { flex:1; }
    .edit-textarea { width:100%; padding:8px; border:1.5px solid #c084fc; border-radius:8px; font-size:.88rem; font-family:inherit; margin-top:6px; resize:vertical; }

    /* 채팅 */
    .chat-room-list { display:flex; flex-direction:column; gap:10px; }
    .chat-room-card {
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(31,38,135,0.05);
      padding:16px 20px; cursor:pointer; display:flex; align-items:center; justify-content:space-between; transition:transform .15s;
    }
    .chat-room-card:hover { transform:translateY(-2px); }
    .chat-room-name { font-size:1rem; font-weight:700; color:#2d2d2d; }
    .chat-room-preview { font-size:.8rem; color:#9ca3af; margin-top:3px; }
    .chat-arrow { color:#c084fc; font-size:1.2rem; }
    .chat-page { display:none; flex-direction:column; height:calc(100vh - 120px); max-width:640px; margin:0 auto; padding:0 16px 16px; }
    .chat-page.active { display:flex; }
    .chat-header { display:flex; align-items:center; gap:10px; padding:16px 0 12px; }
    .chat-back { background:none; border:none; color:#7c3aed; font-size:1rem; font-weight:700; cursor:pointer; }
    .chat-title { font-size:1rem; font-weight:700; }
    .chat-messages { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding:8px 0; }
    .chat-msg { max-width:75%; }
    .chat-msg.mine { align-self:flex-end; }
    .chat-msg.others { align-self:flex-start; }
    .chat-msg .msg-nick { font-size:.75rem; color:#9ca3af; margin-bottom:3px; }
    .chat-msg.mine .msg-nick { text-align:right; }
    .chat-msg .msg-bubble { padding:10px 14px; border-radius:18px; font-size:.88rem; line-height:1.5; word-break:break-word; }
    .chat-msg.mine .msg-bubble { background:linear-gradient(135deg,#c084fc,#f472b6); color:white; border-bottom-right-radius:4px; }
    .chat-msg.others .msg-bubble { background:rgba(255,255,255,0.7); backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,0.8); color:#2d2d2d; border-bottom-left-radius:4px; }
    .chat-msg .msg-time { font-size:.7rem; color:#9ca3af; margin-top:3px; }
    .chat-msg.mine .msg-time { text-align:right; }
    .chat-input-box { display:flex; gap:8px; padding-top:12px; border-top:1px solid #f3e8ff; }
    .chat-input-box input { flex:1; border-radius:24px; padding:10px 16px; background:rgba(255,255,255,0.7); }
    .chat-input-box button { border-radius:24px; padding:10px 18px; }
    .chat-login-hint { text-align:center; padding:12px; font-size:.85rem; color:#9ca3af; }
  </style>
</head>
<body>

<header>
  <h1 onclick="showPage('home')">🎁 팬나눔</h1>
  <div class="header-btns" id="header-btns">
    <button class="btn btn-white" onclick="showPage('auth')">로그인</button>
  </div>
</header>

<div class="nav-tabs">
  <div class="nav-tab active" id="nav-home" onclick="showPage('home')">🎁 나눔</div>
  <div class="nav-tab" id="nav-chat" onclick="showPage('chat')">💬 채팅</div>
</div>

<!-- 메인 피드 -->
<div class="page active" id="page-home">
  <div class="filter-bar">
    <input type="text" id="artist-filter" placeholder="🔍 아티스트 검색으로 필터링" oninput="filterFeed()" />
  </div>
  <div id="feed-loading" class="loading">나눔 목록 불러오는 중... 🎀</div>
  <div id="feed"></div>
  <div id="feed-empty" class="empty" style="display:none">
    <div class="emoji">🎁</div>
    <p>아직 나눔 게시글이 없어요.<br>첫 번째 나눔을 시작해보세요!</p>
  </div>
</div>

<!-- 채팅 목록 -->
<div class="page" id="page-chat">
  <p class="form-title" style="margin-bottom:16px">💬 아티스트 채팅방</p>
  <div id="chat-room-list" class="chat-room-list">
    <div class="loading">채팅방 불러오는 중...</div>
  </div>
  <div id="chat-room-empty" class="empty" style="display:none">
    <div class="emoji">💬</div>
    <p>아직 채팅방이 없어요.<br>나눔 글을 올리면 채팅방이 생겨요!</p>
  </div>
</div>

<!-- 채팅방 -->
<div class="chat-page" id="page-chatroom">
  <div class="chat-header">
    <button class="chat-back" onclick="showPage('chat')">←</button>
    <span class="chat-title" id="chatroom-title"></span>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div id="chat-input-area">
    <div class="chat-input-box">
      <input type="text" id="chat-input" placeholder="메시지를 입력하세요" onkeydown="if(event.key==='Enter')sendMessage()" />
      <button class="btn btn-primary" onclick="sendMessage()">전송</button>
    </div>
  </div>
  <div class="chat-login-hint" id="chat-login-hint" style="display:none">
    채팅에 참여하려면 <span style="color:#7c3aed;cursor:pointer;font-weight:600" onclick="showPage('auth')">로그인</span>이 필요해요
  </div>
</div>

<!-- 상세보기 -->
<div class="page" id="page-detail">
  <button class="back-btn" onclick="showPage('home')">← 목록으로</button>
  <div id="detail-content"></div>
  <div class="card" style="margin-top:16px">
    <p style="font-size:.95rem;font-weight:700;color:#7c3aed;margin-bottom:12px">💬 댓글</p>
    <div id="comments-list"></div>
    <div id="comment-input-area" style="display:none">
      <div class="comment-input-box">
        <input type="text" id="comment-input" placeholder="댓글을 입력하세요" />
        <button class="btn btn-primary" onclick="submitComment()">등록</button>
      </div>
    </div>
    <p id="comment-login-hint" style="font-size:.82rem;color:#9ca3af;margin-top:8px;display:none">댓글을 달려면 로그인이 필요해요</p>
  </div>
</div>

<!-- 로그인/회원가입 -->
<div class="page" id="page-auth">
  <div class="auth-box">
    <h2>🎀 팬나눔</h2>
    <p>나눔을 올리려면 로그인이 필요해요</p>
    <div class="auth-tab">
      <button class="active" id="tab-login" onclick="switchTab('login')">로그인</button>
      <button id="tab-signup" onclick="switchTab('signup')">회원가입</button>
    </div>
    <div id="auth-login">
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="login-email" placeholder="이메일 입력" />
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="login-pw" placeholder="비밀번호 입력" />
      </div>
      <button class="btn btn-primary" style="width:100%;padding:13px" onclick="doLogin()">로그인</button>
    </div>
    <div id="auth-signup" style="display:none">
      <div class="form-group">
        <label>닉네임</label>
        <input type="text" id="signup-nick" placeholder="팬들에게 보일 닉네임" />
      </div>
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="signup-email" placeholder="이메일 입력" />
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="signup-pw" placeholder="비밀번호 (6자 이상)" />
      </div>
      <button class="btn btn-primary" style="width:100%;padding:13px" onclick="doSignup()">회원가입</button>
    </div>
  </div>
</div>

<!-- 글쓰기 -->
<div class="page" id="page-write">
  <p class="form-title">🎁 나눔 게시글 작성</p>
  <div class="card">
    <div class="form-group">
      <label>🎤 아티스트</label>
      <div class="artist-input-wrap">
        <input type="text" id="w-artist" placeholder="아티스트 이름 입력 (예: BTS, 아이유)" oninput="onArtistInput()" autocomplete="off" />
        <div class="artist-dropdown" id="artist-dropdown"></div>
      </div>
    </div>
    <div class="form-group">
      <label>나눔 물품 종류</label>
      <select id="w-type">
        <option value="">선택해주세요</option>
        <option value="키링">키링</option>
        <option value="부채">부채</option>
        <option value="포카">포카 (포토카드)</option>
        <option value="슬로건">슬로건</option>
        <option value="스티커">스티커</option>
        <option value="기타">기타</option>
      </select>
    </div>
    <div class="form-group">
      <label>제목</label>
      <input type="text" id="w-title" placeholder="예: 직접 만든 키링 5개 나눔해요 🎀" />
    </div>
    <div class="form-group">
      <label>상세 설명</label>
      <textarea id="w-desc" placeholder="물품 설명, 수량, 나눔 방식 등을 자유롭게 적어주세요"></textarea>
    </div>
    <div class="form-group">
      <label>📸 나눔 물품 사진 (선택)</label>
      <input type="file" id="w-image" accept="image/*" onchange="previewImage(event)" />
      <img id="img-preview" class="img-preview" />
    </div>
    <div class="form-group">
      <label>나눔 날짜</label>
      <input type="date" id="w-date" />
    </div>
    <div class="form-group">
      <label>나눔 시간</label>
      <input type="time" id="w-time" />
    </div>
    <div class="form-group">
      <label>📍 나눔 장소</label>
      <div class="search-box">
        <input type="text" id="map-search" placeholder="장소 검색 (예: 잠실종합운동장)" />
        <button class="btn btn-primary" onclick="searchPlace()">검색</button>
      </div>
      <div id="map"></div>
      <p class="location-hint">검색 후 지도를 클릭하면 핀이 꽂혀요</p>
      <div id="selected-location"></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-gray" style="flex:1;padding:13px" onclick="showPage('home')">취소</button>
      <button class="btn btn-primary" style="flex:2;padding:13px" onclick="submitPost()">나눔 올리기 🎁</button>
    </div>
  </div>
</div>

<!-- 글 수정 -->
<div class="page" id="page-edit">
  <p class="form-title">✏️ 게시글 수정</p>
  <div class="card">
    <input type="hidden" id="edit-id" />
    <div class="form-group">
      <label>🎤 아티스트</label>
      <input type="text" id="edit-artist" placeholder="아티스트 이름" />
    </div>
    <div class="form-group">
      <label>나눔 물품 종류</label>
      <select id="edit-type">
        <option value="">선택해주세요</option>
        <option value="키링">키링</option>
        <option value="부채">부채</option>
        <option value="포카">포카 (포토카드)</option>
        <option value="슬로건">슬로건</option>
        <option value="스티커">스티커</option>
        <option value="기타">기타</option>
      </select>
    </div>
    <div class="form-group">
      <label>제목</label>
      <input type="text" id="edit-title" />
    </div>
    <div class="form-group">
      <label>상세 설명</label>
      <textarea id="edit-desc"></textarea>
    </div>
    <div class="form-group">
      <label>나눔 날짜</label>
      <input type="date" id="edit-date" />
    </div>
    <div class="form-group">
      <label>나눔 시간</label>
      <input type="time" id="edit-time" />
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-gray" style="flex:1;padding:13px" onclick="showPage('home')">취소</button>
      <button class="btn btn-primary" style="flex:2;padding:13px" onclick="saveEdit()">수정 완료</button>
    </div>
  </div>
</div>

<button class="write-fab" id="write-fab" onclick="showPage('write')">＋ 나눔 올리기</button>
<div id="toast"></div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=d7953a0bc522cd275dda0cfb66574ec8&libraries=services"></script>

<script>
  const SUPABASE_URL = 'https://earzzdatnwsoqpvmwkwy.supabase.co'
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhcnp6ZGF0bndzb3Fwdm13a3d5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMzg2NDYsImV4cCI6MjA5MzgxNDY0Nn0.kcg-LLhUaKyqFurNmawBf5o12ENgL23moGqa2KOiyWk'

  const { createClient } = supabase
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

  let currentUser = null
  let selectedLat = null, selectedLng = null, selectedAddress = ''
  let kakaoMap = null, marker = null
  let allPosts = []
  let artistList = []
  let currentPostId = null
  let currentArtist = null
  let chatSubscription = null

  function showPage(name) {
    document.querySelectorAll('.page, .chat-page').forEach(p => p.classList.remove('active'))
    const el = document.getElementById('page-' + name)
    if (el) el.classList.add('active')
    window.scrollTo(0, 0)
    ;['home','chat'].forEach(t => {
      const tab = document.getElementById('nav-' + t)
      if (tab) tab.classList.toggle('active', t === name)
    })
    if (name === 'write') { initMap(); loadArtistList() }
    if (name === 'home') loadFeed()
    if (name === 'chat') loadChatRooms()
    document.getElementById('write-fab').style.display =
      (name === 'home' && currentUser) ? 'block' : 'none'
    if (name !== 'chatroom' && chatSubscription) {
      chatSubscription.unsubscribe()
      chatSubscription = null
    }
  }

  function switchTab(tab) {
    document.getElementById('auth-login').style.display = tab === 'login' ? 'block' : 'none'
    document.getElementById('auth-signup').style.display = tab === 'signup' ? 'block' : 'none'
    document.getElementById('tab-login').classList.toggle('active', tab === 'login')
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup')
  }

  function toast(msg) {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.classList.add('show')
    setTimeout(() => t.classList.remove('show'), 2500)
  }

  function previewImage(event) {
    const file = event.target.files[0]
    if (!file) return
    const preview = document.getElementById('img-preview')
    preview.src = URL.createObjectURL(file)
    preview.style.display = 'block'
  }

  async function uploadImage(file) {
    const ext = file.name.split('.').pop()
    const fileName = `${Date.now()}.${ext}`
    const { error } = await sb.storage.from('images').upload(fileName, file)
    if (error) return null
    const { data: urlData } = sb.storage.from('images').getPublicUrl(fileName)
    return urlData.publicUrl
  }

  async function loadArtistList() {
    const { data } = await sb.from('posts').select('artist')
    if (!data) return
    artistList = [...new Set(data.map(p => p.artist).filter(Boolean))]
  }

  function onArtistInput() {
    const val = document.getElementById('w-artist').value.trim()
    const dropdown = document.getElementById('artist-dropdown')
    if (!val) { dropdown.style.display = 'none'; return }
    const filtered = artistList.filter(a => a.toLowerCase().includes(val.toLowerCase()))
    if (filtered.length === 0) { dropdown.style.display = 'none'; return }
    dropdown.innerHTML = filtered.map(a => `<div onclick="selectArtist('${a}')">${a}</div>`).join('')
    dropdown.style.display = 'block'
  }

  function selectArtist(name) {
    document.getElementById('w-artist').value = name
    document.getElementById('artist-dropdown').style.display = 'none'
  }

  function filterFeed() {
    const keyword = document.getElementById('artist-filter').value.trim().toLowerCase()
    const feed = document.getElementById('feed')
    const empty = document.getElementById('feed-empty')
    const filtered = keyword ? allPosts.filter(p => p.artist && p.artist.toLowerCase().includes(keyword)) : allPosts
    feed.innerHTML = ''
    if (filtered.length === 0) { empty.style.display = 'block'; return }
    empty.style.display = 'none'
    filtered.forEach(post => renderCard(post, feed))
  }

  function renderCard(post, container) {
    const card = document.createElement('div')
    card.className = 'card' + (post.is_closed ? ' closed' : '')
    const isOwner = currentUser && currentUser.id === post.user_id
    card.innerHTML = `
      ${post.image_url ? `<img src="${post.image_url}" class="card-img" onclick="openDetail('${post.id}')" style="cursor:pointer" />` : ''}
      <span class="badge ${post.is_closed ? 'badge-closed' : 'badge-open'}">${post.is_closed ? '마감' : '나눔중'}</span>
      ${post.item_type ? `<span class="badge badge-type">${post.item_type}</span>` : ''}
      ${post.artist ? `<span class="badge badge-artist">🎤 ${post.artist}</span>` : ''}
      <h3 onclick="openDetail('${post.id}')">${post.title}</h3>
      <p style="font-size:.88rem;color:#4b5563;margin-top:4px">${post.description || ''}</p>
      <div class="meta">
        <span>👤 ${post.nickname || '익명'}</span>
        ${post.share_date ? `<span>📅 ${post.share_date}</span>` : ''}
        ${post.share_time ? `<span>⏰ ${post.share_time}</span>` : ''}
        ${post.location_name ? `<span>📍 ${post.location_name}</span>` : ''}
      </div>
      ${isOwner ? `
        <div class="card-actions">
          ${!post.is_closed ? `<button class="btn btn-danger btn-sm" onclick="closePost('${post.id}')">마감하기</button>` : ''}
          <button class="btn btn-gray btn-sm" onclick="openEdit('${post.id}')">수정</button>
          <button class="btn btn-gray btn-sm" onclick="deletePost('${post.id}')">삭제</button>
        </div>` : ''}
    `
    container.appendChild(card)
  }

  async function openDetail(postId) {
    currentPostId = postId
    const post = allPosts.find(p => p.id === postId)
    if (!post) return
    const detail = document.getElementById('detail-content')
    detail.innerHTML = `
      <div class="card">
        ${post.image_url ? `<img src="${post.image_url}" class="detail-img" />` : ''}
        <span class="badge ${post.is_closed ? 'badge-closed' : 'badge-open'}">${post.is_closed ? '마감' : '나눔중'}</span>
        ${post.item_type ? `<span class="badge badge-type">${post.item_type}</span>` : ''}
        ${post.artist ? `<span class="badge badge-artist">🎤 ${post.artist}</span>` : ''}
        <h3 style="font-size:1.1rem;margin-bottom:8px">${post.title}</h3>
        <p style="font-size:.9rem;color:#374151;line-height:1.6">${post.description || ''}</p>
        <div class="meta" style="margin-top:12px">
          <span>👤 ${post.nickname || '익명'}</span>
          ${post.share_date ? `<span>📅 ${post.share_date}</span>` : ''}
          ${post.share_time ? `<span>⏰ ${post.share_time}</span>` : ''}
          ${post.location_name ? `<span>📍 ${post.location_name}</span>` : ''}
        </div>
      </div>
    `
    showPage('detail')
    await loadComments(postId)
    if (currentUser) {
      document.getElementById('comment-input-area').style.display = 'block'
      document.getElementById('comment-login-hint').style.display = 'none'
    } else {
      document.getElementById('comment-input-area').style.display = 'none'
      document.getElementById('comment-login-hint').style.display = 'block'
    }
  }

  async function loadComments(postId) {
    const list = document.getElementById('comments-list')
    list.innerHTML = '<p style="font-size:.85rem;color:#9ca3af">불러오는 중...</p>'
    const { data, error } = await sb.from('comments').select('*').eq('post_id', postId).order('created_at', { ascending: true })
    if (error || !data) { list.innerHTML = ''; return }
    if (data.length === 0) { list.innerHTML = '<p style="font-size:.85rem;color:#9ca3af">아직 댓글이 없어요</p>'; return }
    list.innerHTML = ''
    data.forEach(c => renderComment(c, list))
  }

  function renderComment(c, container) {
    const isOwner = currentUser && currentUser.id === c.user_id
    const date = new Date(c.created_at).toLocaleDateString('ko-KR')
    const div = document.createElement('div')
    div.className = 'comment-box'
    div.id = 'comment-' + c.id
    div.innerHTML = `
      <div class="comment-nick">${c.nickname || '익명'}</div>
      <div class="comment-content" id="comment-text-${c.id}">${c.content}</div>
      <div class="comment-meta">
        <span>${date}</span>
        ${isOwner ? `
          <div class="comment-actions">
            <button class="btn btn-gray btn-sm" onclick="startEditComment('${c.id}', \`${c.content.replace(/`/g, "'")}\`)">수정</button>
            <button class="btn btn-danger btn-sm" onclick="deleteComment('${c.id}')">삭제</button>
          </div>` : ''}
      </div>
    `
    container.appendChild(div)
  }

  function startEditComment(id, content) {
    const textEl = document.getElementById('comment-text-' + id)
    textEl.innerHTML = `
      <textarea class="edit-textarea" id="edit-comment-${id}">${content}</textarea>
      <div style="display:flex;gap:6px;margin-top:6px">
        <button class="btn btn-primary btn-sm" onclick="saveComment('${id}')">저장</button>
        <button class="btn btn-gray btn-sm" onclick="loadComments('${currentPostId}')">취소</button>
      </div>
    `
  }

  async function saveComment(id) {
    const content = document.getElementById('edit-comment-' + id).value.trim()
    if (!content) return toast('내용을 입력해주세요')
    const { error } = await sb.from('comments').update({ content }).eq('id', id)
    if (error) return toast('수정 실패')
    toast('댓글이 수정됐어요!')
    loadComments(currentPostId)
  }

  async function deleteComment(id) {
    if (!confirm('댓글을 삭제할까요?')) return
    const { error } = await sb.from('comments').delete().eq('id', id)
    if (error) return toast('삭제 실패')
    toast('댓글이 삭제됐어요!')
    loadComments(currentPostId)
  }

  async function submitComment() {
    if (!currentUser) return toast('로그인이 필요해요')
    const content = document.getElementById('comment-input').value.trim()
    if (!content) return toast('댓글을 입력해주세요')
    const { error } = await sb.from('comments').insert({
      post_id: currentPostId,
      user_id: currentUser.id,
      nickname: currentUser.user_metadata?.nickname || currentUser.email,
      content
    })
    if (error) return toast('댓글 등록 실패')
    document.getElementById('comment-input').value = ''
    toast('댓글이 등록됐어요!')
    loadComments(currentPostId)
  }

  async function loadChatRooms() {
    const listEl = document.getElementById('chat-room-list')
    const emptyEl = document.getElementById('chat-room-empty')
    listEl.innerHTML = '<div class="loading">채팅방 불러오는 중...</div>'
    const { data } = await sb.from('posts').select('artist')
    if (!data) { listEl.innerHTML = ''; return }
    const artists = [...new Set(data.map(p => p.artist).filter(Boolean))]
    if (artists.length === 0) { listEl.innerHTML = ''; emptyEl.style.display = 'block'; return }
    emptyEl.style.display = 'none'
    listEl.innerHTML = ''
    for (const artist of artists) {
      const { data: lastMsg } = await sb.from('chat_messages')
        .select('content, nickname').eq('artist', artist)
        .order('created_at', { ascending: false }).limit(1)
      const preview = lastMsg && lastMsg[0] ? `${lastMsg[0].nickname}: ${lastMsg[0].content}` : '아직 메시지가 없어요'
      const card = document.createElement('div')
      card.className = 'chat-room-card'
      card.innerHTML = `
        <div>
          <div class="chat-room-name">🎤 ${artist}</div>
          <div class="chat-room-preview">${preview}</div>
        </div>
        <span class="chat-arrow">›</span>
      `
      card.onclick = () => openChatRoom(artist)
      listEl.appendChild(card)
    }
  }

  async function openChatRoom(artist) {
    currentArtist = artist
    document.getElementById('chatroom-title').textContent = `🎤 ${artist} 채팅방`
    if (chatSubscription) { chatSubscription.unsubscribe(); chatSubscription = null }
    document.querySelectorAll('.page, .chat-page').forEach(p => p.classList.remove('active'))
    document.getElementById('page-chatroom').classList.add('active')
    window.scrollTo(0, 0)
    document.getElementById('write-fab').style.display = 'none'
    if (currentUser) {
      document.getElementById('chat-input-area').style.display = 'block'
      document.getElementById('chat-login-hint').style.display = 'none'
    } else {
      document.getElementById('chat-input-area').style.display = 'none'
      document.getElementById('chat-login-hint').style.display = 'block'
    }
    await loadChatMessages()
    subscribeChatMessages()
  }

  async function loadChatMessages() {
    const container = document.getElementById('chat-messages')
    container.innerHTML = ''
    const { data } = await sb.from('chat_messages')
      .select('*').eq('artist', currentArtist)
      .order('created_at', { ascending: true })
    if (!data) return
    data.forEach(msg => renderChatMessage(msg, container))
    container.scrollTop = container.scrollHeight
  }

  function renderChatMessage(msg, container) {
    const isMine = currentUser && currentUser.id === msg.user_id
    const time = new Date(msg.created_at).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
    const div = document.createElement('div')
    div.className = 'chat-msg ' + (isMine ? 'mine' : 'others')
    div.innerHTML = `
      ${!isMine ? `<div class="msg-nick">${msg.nickname || '익명'}</div>` : ''}
      <div class="msg-bubble">${msg.content}</div>
      <div class="msg-time">${time}</div>
    `
    container.appendChild(div)
  }

  function subscribeChatMessages() {
    chatSubscription = sb.channel('chat-' + currentArtist)
      .on('postgres_changes', {
        event: 'INSERT', schema: 'public', table: 'chat_messages',
        filter: `artist=eq.${currentArtist}`
      }, payload => {
        const container = document.getElementById('chat-messages')
        renderChatMessage(payload.new, container)
        container.scrollTop = container.scrollHeight
      })
      .subscribe()
  }

  async function sendMessage() {
    if (!currentUser) return toast('로그인이 필요해요')
    const input = document.getElementById('chat-input')
    const content = input.value.trim()
    if (!content) return
    input.value = ''
    const { error } = await sb.from('chat_messages').insert({
      user_id: currentUser.id,
      nickname: currentUser.user_metadata?.nickname || currentUser.email,
      artist: currentArtist, content
    })
    if (error) toast('전송 실패')
  }

  function openEdit(postId) {
    const post = allPosts.find(p => p.id === postId)
    if (!post) return
    document.getElementById('edit-id').value = post.id
    document.getElementById('edit-artist').value = post.artist || ''
    document.getElementById('edit-type').value = post.item_type || ''
    document.getElementById('edit-title').value = post.title || ''
    document.getElementById('edit-desc').value = post.description || ''
    document.getElementById('edit-date').value = post.share_date || ''
    document.getElementById('edit-time').value = post.share_time || ''
    showPage('edit')
  }

  async function saveEdit() {
    const id = document.getElementById('edit-id').value
    const artist = document.getElementById('edit-artist').value.trim()
    const type = document.getElementById('edit-type').value
    const title = document.getElementById('edit-title').value.trim()
    const desc = document.getElementById('edit-desc').value.trim()
    const date = document.getElementById('edit-date').value
    const time = document.getElementById('edit-time').value
    if (!title) return toast('제목을 입력해주세요')
    if (!date || !time) return toast('날짜와 시간을 입력해주세요')
    const { error } = await sb.from('posts').update({
      artist, item_type: type, title, description: desc, share_date: date, share_time: time
    }).eq('id', id)
    if (error) return toast('수정 실패: ' + error.message)
    toast('수정 완료! 🎉')
    showPage('home')
  }

  async function loadFeed() {
    document.getElementById('feed-loading').style.display = 'block'
    document.getElementById('feed').innerHTML = ''
    document.getElementById('feed-empty').style.display = 'none'
    const { data, error } = await sb.from('posts').select('*')
      .order('is_closed', { ascending: true })
      .order('created_at', { ascending: false })
    document.getElementById('feed-loading').style.display = 'none'
    if (error || !data) return toast('불러오기 실패')
    allPosts = data
    if (data.length === 0) { document.getElementById('feed-empty').style.display = 'block'; return }
    const feed = document.getElementById('feed')
    data.forEach(post => renderCard(post, feed))
  }

  async function closePost(id) {
    if (!confirm('나눔을 마감할까요?')) return
    const { error } = await sb.from('posts').update({ is_closed: true }).eq('id', id)
    if (error) return toast('마감 실패')
    toast('마감 처리 완료!')
    loadFeed()
  }

  async function deletePost(id) {
    if (!confirm('게시글을 삭제할까요?')) return
    const { error } = await sb.from('posts').delete().eq('id', id)
    if (error) return toast('삭제 실패')
    toast('삭제 완료!')
    loadFeed()
  }

  async function submitPost() {
    if (!currentUser) return toast('로그인이 필요해요')
    const artist = document.getElementById('w-artist').value.trim()
    const title = document.getElementById('w-title').value.trim()
    const desc = document.getElementById('w-desc').value.trim()
    const type = document.getElementById('w-type').value
    const date = document.getElementById('w-date').value
    const time = document.getElementById('w-time').value
    const imageFile = document.getElementById('w-image').files[0]
    if (!artist) return toast('아티스트를 입력해주세요')
    if (!title) return toast('제목을 입력해주세요')
    if (!date || !time) return toast('날짜와 시간을 입력해주세요')
    if (!selectedLat) return toast('지도에서 장소를 선택해주세요')
    let image_url = null
    if (imageFile) { toast('사진 업로드 중...'); image_url = await uploadImage(imageFile) }
    const { error } = await sb.from('posts').insert({
      user_id: currentUser.id,
      nickname: currentUser.user_metadata?.nickname || currentUser.email,
      artist, title, description: desc, item_type: type,
      share_date: date, share_time: time,
      location_name: selectedAddress,
      latitude: selectedLat, longitude: selectedLng, image_url,
    })
    if (error) return toast('저장 실패: ' + error.message)
    toast('나눔 게시글이 올라갔어요! 🎁')
    document.getElementById('w-artist').value = ''
    document.getElementById('w-image').value = ''
    document.getElementById('img-preview').style.display = 'none'
    showPage('home')
  }

  function searchPlace() {
    const keyword = document.getElementById('map-search').value.trim()
    if (!keyword) return toast('장소를 입력해주세요')
    const ps = new kakao.maps.services.Places()
    ps.keywordSearch(keyword, function(data, status) {
      if (status !== kakao.maps.services.Status.OK) return toast('검색 결과가 없어요')
      const place = data[0]
      const coords = new kakao.maps.LatLng(place.y, place.x)
      kakaoMap.setCenter(coords); kakaoMap.setLevel(3)
      if (marker) marker.setMap(null)
      marker = new kakao.maps.Marker({ position: coords, map: kakaoMap })
      selectedLat = place.y; selectedLng = place.x; selectedAddress = place.address_name
      document.getElementById('selected-location').textContent = '📍 ' + place.place_name + ' (' + place.address_name + ')'
    })
  }

  function initMap() {
    if (kakaoMap) return
    setTimeout(() => {
      try {
        const container = document.getElementById('map')
        kakaoMap = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(37.5665, 126.9780), level: 5 })
        const geocoder = new kakao.maps.services.Geocoder()
        kakao.maps.event.addListener(kakaoMap, 'click', function(e) {
          const lat = e.latLng.getLat(), lng = e.latLng.getLng()
          selectedLat = lat; selectedLng = lng
          if (marker) marker.setMap(null)
          marker = new kakao.maps.Marker({ position: e.latLng, map: kakaoMap })
          geocoder.coord2Address(lng, lat, function(result, status) {
            if (status === kakao.maps.services.Status.OK) {
              selectedAddress = result[0].address.address_name
              document.getElementById('selected-location').textContent = '📍 ' + selectedAddress
            }
          })
        })
      } catch(e) {
        document.getElementById('map').innerHTML = '<p style="padding:20px;color:#9ca3af;text-align:center">카카오맵 API 키를 설정해주세요</p>'
      }
    }, 300)
  }

  async function doLogin() {
    const email = document.getElementById('login-email').value.trim()
    const pw = document.getElementById('login-pw').value
    if (!email || !pw) return toast('이메일과 비밀번호를 입력해주세요')
    const { error } = await sb.auth.signInWithPassword({ email, password: pw })
    if (error) return toast('로그인 실패: ' + error.message)
    toast('로그인 성공! 🎉')
    showPage('home')
  }

  async function doSignup() {
    const nick = document.getElementById('signup-nick').value.trim()
    const email = document.getElementById('signup-email').value.trim()
    const pw = document.getElementById('signup-pw').value
    if (!nick || !email || !pw) return toast('모든 항목을 입력해주세요')
    if (pw.length < 6) return toast('비밀번호는 6자 이상이어야 해요')
    const { error } = await sb.auth.signUp({ email, password: pw, options: { data: { nickname: nick } } })
    if (error) return toast('가입 실패: ' + error.message)
    toast('가입 완료! 이메일 인증 후 로그인하세요 📧')
  }

  async function doLogout() {
    await sb.auth.signOut()
    currentUser = null
    updateHeader()
    showPage('home')
    toast('로그아웃 되었어요')
  }

  function updateHeader() {
    const btns = document.getElementById('header-btns')
    if (currentUser) {
      const nick = currentUser.user_metadata?.nickname || currentUser.email
      btns.innerHTML = `
        <span style="color:white;font-size:.85rem;font-weight:600">${nick}</span>
        <button class="btn btn-outline" onclick="doLogout()">로그아웃</button>`
      document.getElementById('write-fab').style.display = 'block'
    } else {
      btns.innerHTML = `<button class="btn btn-white" onclick="showPage('auth')">로그인</button>`
      document.getElementById('write-fab').style.display = 'none'
    }
  }

  async function init() {
    const { data: { session } } = await sb.auth.getSession()
    if (session) currentUser = session.user
    updateHeader()
    loadFeed()
    sb.auth.onAuthStateChange((_event, session) => {
      currentUser = session?.user || null
      updateHeader()
    })
  }

  init()
</script>
</body>
</html>
